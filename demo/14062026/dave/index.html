<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Report · Dave Cotter · Kelsor Ventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070710;--bgElev:#0C0C18;--surface:#13131F;--surfaceUp:#1A1A28;--card:#15151F;
  --border:rgba(255,255,255,0.08);--borderUp:rgba(255,255,255,0.14);
  --purple:#7C6FE8;--amber:#FFA51F;--green:#22C55E;--cyan:#22D3EE;--pink:#EC4899;--blue:#3B82F6;
  --t100:#FFFFFF;--t85:rgba(255,255,255,0.88);--t65:rgba(255,255,255,0.68);--t45:rgba(255,255,255,0.46);--t28:rgba(255,255,255,0.30);
  --d:'Plus Jakarta Sans',-apple-system,sans-serif;--m:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t85);font-family:var(--d);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,111,232,0.12),transparent),radial-gradient(ellipse 60% 50% at 100% 0,rgba(59,130,246,0.08),transparent);pointer-events:none;z-index:0}
.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{width:230px;background:rgba(12,12,24,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center}
.sb-wordmark{font-family:var(--m);font-size:13px;font-weight:700;letter-spacing:0.16em;color:var(--t100);text-transform:uppercase}
.sb-nav{flex:1;padding:14px 12px}
.sb-item{width:100%;display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:9px;border:none;background:transparent;color:var(--t45);cursor:pointer;margin-bottom:4px;font-size:13px;font-weight:500;font-family:var(--d);position:relative;transition:all .15s;text-align:left}
.sb-item:hover{background:rgba(255,255,255,0.04);color:var(--t65)}
.sb-item.active{background:rgba(124,111,232,0.14);color:#fff;font-weight:600}
.sb-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--purple)}
.sb-item svg{width:17px;height:17px;flex-shrink:0}
.sb-badge{margin-left:auto;font-family:var(--m);font-size:7px;background:rgba(255,165,31,0.12);color:var(--amber);border:1px solid rgba(255,165,31,0.3);border-radius:10px;padding:2px 6px;letter-spacing:0.06em;text-transform:uppercase}
.sb-user{padding:16px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-family:var(--m);font-size:11px;font-weight:700;color:#fff}
.sb-uname{font-size:12px;font-weight:600;color:var(--t85)}
.sb-ufirm{font-size:10px;color:var(--t45)}

/* MAIN */
.main{flex:1;min-width:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,7,16,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:54px}
.tb-week{font-family:var(--m);font-size:11px;color:var(--amber);letter-spacing:0.1em;text-transform:uppercase}
.tb-right{display:flex;align-items:center;gap:16px}
.tb-live{display:flex;align-items:center;gap:6px;font-family:var(--m);font-size:9px;color:var(--green);letter-spacing:0.1em;text-transform:uppercase}
.tb-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pp 2s infinite}
@keyframes pp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)}50%{opacity:.6;box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.content{padding:26px 28px 70px;max-width:1000px;margin:0 auto}
.test-banner{background:rgba(255,165,31,0.10);border:1px solid rgba(255,165,31,0.3);border-radius:10px;padding:10px 18px;text-align:center;font-family:var(--m);font-size:10px;color:var(--amber);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:24px}
.page-title{font-size:28px;font-weight:800;color:var(--t100);line-height:1.2;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--t65);margin-bottom:28px}

/* GLASS */
.glass{background:rgba(21,21,31,0.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.28)}

/* PANELS / SECTIONS */
.view{display:none}
.view.active{display:block;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{padding:18px;position:relative;overflow:hidden}
.stat-top{position:absolute;top:0;left:0;right:0;height:3px}
.stat-head{display:flex;justify-content:space-between;margin-bottom:14px}
.stat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:18px;height:18px}
.stat-chg{font-size:11px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:2px}
.stat-num{font-family:var(--m);font-size:30px;font-weight:700;line-height:1;margin-bottom:5px}
.stat-lbl{font-family:var(--m);font-size:9px;color:var(--t45);letter-spacing:0.1em;text-transform:uppercase}
.stat-bar{margin-top:12px;height:4px;background:var(--surfaceUp);border-radius:2px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px}

/* CHART CARD */
.chart-row{display:grid;gap:12px;margin-bottom:24px}
.chart-row.r1{grid-template-columns:1fr 1.5fr}
.chart-row.r2{grid-template-columns:1fr 1fr}
.chart-card{padding:20px}
.chart-title{font-family:var(--m);font-size:9px;color:var(--t45);letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin-bottom:16px}
.legend{margin-top:12px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.legend-name{color:var(--t65);flex:1}
.legend-val{font-family:var(--m);font-weight:700;color:var(--t85)}

/* MARKET PULSE */
.pulse{position:relative;overflow:hidden;margin-bottom:8px}
.pulse-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--purple)}
.pulse-inner{padding:20px 24px}
.pulse-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pulse-ic{width:22px;height:22px;border-radius:50%;background:rgba(124,111,232,0.18);border:1px solid rgba(124,111,232,0.4);display:flex;align-items:center;justify-content:center}
.pulse-ic svg{width:12px;height:12px}
.pulse-lbl{font-family:var(--m);font-size:10px;color:var(--purple);letter-spacing:0.14em;text-transform:uppercase;font-weight:700}
.pulse-txt{font-size:14px;color:var(--t65);line-height:1.7;padding-left:30px}

/* SECTION DIVIDER */
.divider{display:flex;align-items:center;gap:14px;margin:0 0 18px}
.divider.mt{margin-top:30px}
.div-tag{font-family:var(--m);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;white-space:nowrap}
.div-count{font-family:var(--m);font-size:10px;color:var(--t28);white-space:nowrap}
.div-rule{flex:1;height:1px;background:var(--border)}

/* LEAD CARD */
.lead{margin-bottom:16px;overflow:hidden;transition:box-shadow .3s}
.lead-head{padding:16px 22px;position:relative;overflow:hidden;cursor:pointer}
.lead-head-orb{position:absolute;top:-30px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08)}
.lead-badges{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative;flex-wrap:wrap}
.lb{font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.lb-hot{background:rgba(255,255,255,0.2);color:#fff}
.lb-hot::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%}
.lb-sig{font-family:var(--m);font-size:9px;color:rgba(255,255,255,0.88);letter-spacing:0.08em;text-transform:uppercase}
.lb-pri{margin-left:auto;font-family:var(--m);font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.95)}
.lead-chev{flex-shrink:0;transition:transform .3s}
.lead-chev svg{width:18px;height:18px}
.lead.open .lead-chev{transform:rotate(180deg)}
.lead-id{display:flex;gap:14px;align-items:center;position:relative}
.lead-av{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.32);display:flex;align-items:center;justify-content:center;font-family:var(--m);font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.lead-name{font-size:18px;font-weight:800;color:#fff;margin-bottom:2px}
.lead-role{font-size:13px;color:rgba(255,255,255,0.88)}
.lead-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;position:relative}
.lead-tag{font-family:var(--m);font-size:9px;color:#fff;letter-spacing:0.04em;background:rgba(255,255,255,0.16);padding:3px 9px;border-radius:6px}
.lead-hint{margin-top:12px;font-size:11px;color:rgba(255,255,255,0.72);font-family:var(--m);letter-spacing:0.06em;position:relative}
.lead.open .lead-hint{display:none}
.lead-body{display:none}
.lead.open .lead-body{display:block}

/* ACTION BUTTONS */
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 22px;border-bottom:1px solid var(--border)}
.act{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;border:1px solid var(--border);background:var(--surfaceUp);color:var(--t85);font-family:var(--d);transition:all .15s}
.act:hover{border-color:var(--borderUp)}
.act svg{width:13px;height:13px}
.act-li{background:#0A66C2;color:#fff;border-color:#0A66C2}
.act.copied{color:var(--green);border-color:rgba(34,197,94,0.4)}
.contact-strip{display:flex;flex-wrap:wrap;gap:16px;padding:10px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
.contact-item{font-size:11px;color:var(--t65);display:flex;align-items:center;gap:6px}
.contact-item svg{width:12px;height:12px}

/* TILE: why-fit hero */
.whyfit{margin:18px 22px 0;padding:16px 18px;border-radius:12px;position:relative}
.whyfit-head{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.whyfit-head svg{width:14px;height:14px}
.whyfit-lbl{font-family:var(--m);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.whyfit-txt{font-size:13.5px;color:var(--t85);line-height:1.65}

/* INTEL TILES */
.intel-wrap{margin:16px 22px}
.intel-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.intel-head svg{width:13px;height:13px}
.intel-head-lbl{font-family:var(--m);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.intel-tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color .2s}
.tile:hover{border-color:var(--borderUp)}
.tile-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tile-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tile-ic svg{width:14px;height:14px}
.tile-lbl{font-family:var(--m);font-size:8px;color:var(--t45);letter-spacing:0.1em;text-transform:uppercase}
.tile-val{font-size:13px;color:var(--t85);line-height:1.5}

/* WHY NOW */
.whynow{margin:0 22px 16px;padding:14px 18px;border-radius:0 10px 10px 0}
.whynow-lbl{font-family:var(--m);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.whynow-txt{font-size:13.5px;color:var(--t85);line-height:1.6}

/* OUTREACH */
.outreach{margin:0 22px 18px}
.outreach-title{font-family:var(--m);font-size:10px;color:var(--t45);letter-spacing:0.14em;text-transform:uppercase;font-weight:700;margin-bottom:12px}
.or-block{background:var(--surface);border-radius:12px;overflow:hidden;margin-bottom:12px}
.or-head{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
.or-head svg{width:13px;height:13px}
.or-head-lbl{font-family:var(--m);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;flex:1}
.or-count{font-family:var(--m);font-size:8px;color:var(--t45)}
.or-body{padding:14px 16px;position:relative}
.or-text{font-size:13.5px;color:var(--t85);line-height:1.65;padding-right:74px;white-space:pre-wrap}
.copy-btn{position:absolute;top:12px;right:12px;border-radius:6px;padding:4px 10px;font-family:var(--m);font-size:8px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:4px;background:transparent}
.copy-btn svg{width:10px;height:10px}
.copy-btn.copied{color:var(--green)!important;border-color:rgba(34,197,94,0.4)!important}
.or-subj-lbl{font-size:11px;color:var(--t45);margin-bottom:4px;font-family:var(--m);padding-right:74px}
.or-subj{font-size:13.5px;font-weight:700;margin-bottom:12px}
.lead-foot{padding:10px 22px;border-top:1px solid var(--border);font-family:var(--m);font-size:8px;color:rgba(255,165,31,0.4);letter-spacing:0.1em;text-transform:uppercase}

/* SIGNALS VIEW */
.sig-card{padding:22px;margin-bottom:14px}
.sig-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sig-card-name{font-size:15px;font-weight:700;color:var(--t100)}
.sig-card-num{font-family:var(--m);font-size:24px;font-weight:700}
.sig-card-desc{font-size:13px;color:var(--t65);line-height:1.6;margin-bottom:14px}
.sig-leads{display:flex;flex-wrap:wrap;gap:8px}
.sig-lead{font-family:var(--m);font-size:10px;color:var(--t65);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 10px}

/* ICP / SETTINGS */
.icp-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:12px;overflow:hidden}
.icp-cell{background:var(--card);padding:16px 18px}
.icp-cell-lbl{font-family:var(--m);font-size:8px;color:var(--t45);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.icp-cell-val{font-size:13px;color:var(--t85);font-weight:600}

/* CONTENT VIEW */
.cv-hero{overflow:hidden;margin-bottom:20px}
.cv-hero-grad{background:linear-gradient(135deg,var(--purple),var(--blue));padding:28px;position:relative;overflow:hidden}
.cv-hero-orb{position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.08)}
.cv-eyebrow{font-family:var(--m);font-size:9px;color:rgba(255,255,255,0.85);letter-spacing:0.14em;text-transform:uppercase;font-weight:700;position:relative}
.cv-title{font-size:24px;font-weight:800;color:#fff;margin:10px 0 8px;line-height:1.25;position:relative}
.cv-sub{font-size:14px;color:rgba(255,255,255,0.9);line-height:1.6;max-width:560px;position:relative}
.cv-benefits{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.cv-ben{padding:18px}
.cv-ben-ic{width:34px;height:34px;border-radius:10px;background:rgba(124,111,232,0.12);border:1px solid rgba(124,111,232,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.cv-ben-ic svg{width:16px;height:16px}
.cv-ben-t{font-size:14px;font-weight:700;color:var(--t100);margin-bottom:5px}
.cv-ben-d{font-size:12px;color:var(--t65);line-height:1.55}
.cv-post{padding:20px;margin-bottom:12px}
.cv-post-tag{font-family:var(--m);font-size:8px;color:var(--purple);letter-spacing:0.1em;text-transform:uppercase;background:rgba(124,111,232,0.12);border:1px solid rgba(124,111,232,0.3);border-radius:6px;padding:3px 8px}
.cv-post-hook{font-size:15px;font-weight:700;color:var(--t100);margin:12px 0 8px;line-height:1.4}
.cv-post-body{font-size:13px;color:var(--t65);line-height:1.65;white-space:pre-wrap}
.cv-cta{padding:26px;text-align:center;border:1px solid rgba(124,111,232,0.4)}
.cv-cta-t{font-size:17px;font-weight:700;color:var(--t100);margin-bottom:8px}
.cv-cta-d{font-size:13px;color:var(--t65);max-width:440px;margin:0 auto 18px;line-height:1.6}
.cv-cta-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--d)}
.cv-cta-btn svg{width:15px;height:15px}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:28px 0 0;margin-top:40px;text-align:center}
.foot-brand{font-family:var(--m);font-size:10px;color:var(--purple);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:10px}
.foot-txt{font-size:11px;color:var(--t28);line-height:1.8}
.foot-txt a{color:var(--purple);text-decoration:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:var(--bg);font-family:var(--m);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:10px 20px;border-radius:20px;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* SCROLLBAR */
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* RESPONSIVE */
@media(max-width:820px){
  .sidebar{width:64px}
  .sb-wordmark,.sb-uname,.sb-ufirm,.sb-item span,.sb-badge{display:none}
  .sb-item{justify-content:center;padding:11px}
  .sb-user{justify-content:center}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .chart-row.r1,.chart-row.r2{grid-template-columns:1fr}
  .cv-benefits{grid-template-columns:1fr}
}
@media(max-width:560px){
  .content{padding:20px 16px 60px}
  .page-title{font-size:22px}
  .intel-tiles{grid-template-columns:1fr}
  .actions{grid-template-columns:1fr 1fr}
  .icp-grid{grid-template-columns:1fr}
  .lead-head,.actions,.contact-strip,.whyfit,.intel-wrap,.whynow,.outreach,.lead-foot{margin-left:0;margin-right:0;padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>
<div class="toast" id="toast">Copied to clipboard</div>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo"><img src="https://raw.githubusercontent.com/pinkiousme/authority-infra/main/assets/pipelind-logo-dark.png" alt="Pipelind" style="height:20px;width:auto" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span class="sb-wordmark" style="display:none">Pipelind</span></div>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-view="pipeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <span>Pipeline</span>

function donutSVG(data,size){
  var total=0;data.forEach(function(d){total+=d.value;});
  var r=size/2, ir=r*0.62, cx=r, cy=r, ang=-90, paths='';
  data.forEach(function(d){
    var slice=d.value/total*360;
    var a0=ang*Math.PI/180, a1=(ang+slice)*Math.PI/180;
    var x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    var xi0=cx+ir*Math.cos(a1),yi0=cy+ir*Math.sin(a1),xi1=cx+ir*Math.cos(a0),yi1=cy+ir*Math.sin(a0);
    var large=slice>180?1:0;
    paths+='<path d="M'+x0+' '+y0+' A'+r+' '+r+' 0 '+large+' 1 '+x1+' '+y1+' L'+xi0+' '+yi0+' A'+ir+' '+ir+' 0 '+large+' 0 '+xi1+' '+yi1+' Z" fill="'+d.color+'"/>';
    ang+=slice;
  });
  return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'+paths+'</svg>';
}
function barsSVG(data,w,h,color,horizontal){
  var max=0;data.forEach(function(d){if(d.n>max)max=d.n;});
  var pad=4,n=data.length,svg='';
  if(horizontal){
    var bh=(h-pad*(n-1))/n;
    data.forEach(function(d,i){
      var bw=(d.n/max)*(w-70);
      var y=i*(bh+pad);
      svg+='<text x="0" y="'+(y+bh/2+4)+'" fill="rgba(255,255,255,0.68)" font-size="11" font-family="Space Mono">'+d.c+'</text>';
      svg+='<rect x="56" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="4" fill="'+color+'"/>';
      svg+='<text x="'+(56+bw+6)+'" y="'+(y+bh/2+4)+'" fill="rgba(255,255,255,0.46)" font-size="10" font-family="Space Mono">'+d.n+'</text>';
    });
  }else{
    var bw=(w-pad*(n-1))/n;
    data.forEach(function(d,i){
      var bhh=(d.n/max)*(h-24);
      var x=i*(bw+pad);
      svg+='<rect x="'+x+'" y="'+(h-24-bhh)+'" width="'+bw+'" height="'+bhh+'" rx="4" fill="'+color+'"/>';
      svg+='<text x="'+(x+bw/2)+'" y="'+(h-8)+'" fill="rgba(255,255,255,0.46)" font-size="9" font-family="Space Mono" text-anchor="middle">'+(d.label||d.c||d.s)+'</text>';
    });
  }
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'">'+svg+'</svg>';
}
function areaSVG(data,w,h){
  var max=0;data.forEach(function(d){if(d.l>max)max=d.l;});
  function pts(key){return data.map(function(d,i){var x=i/(data.length-1)*w;var y=h-8-(d[key]/max)*(h-20);return x+','+y;}).join(' ');}
  function area(key){var p=data.map(function(d,i){var x=i/(data.length-1)*w;var y=h-8-(d[key]/max)*(h-20);return x+','+y;});return '0,'+h+' '+p.join(' ')+' '+w+','+h;}
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'"><defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.35"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0"/></linearGradient><linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFA51F" stop-opacity="0.30"/><stop offset="100%" stop-color="#FFA51F" stop-opacity="0"/></linearGradient></defs><polygon points="'+area("l")+'" fill="url(#ga)"/><polyline points="'+pts("l")+'" fill="none" stroke="#22C55E" stroke-width="2.5"/><polygon points="'+area("s")+'" fill="url(#gb)"/><polyline points="'+pts("s")+'" fill="none" stroke="#FFA51F" stroke-width="2.5"/></svg>';
}

function render(name){

  document.getElementById('pageTitle').textContent=v.title;
  document.getElementById('pageSub').textContent=v.sub;
  document.getElementById('viewRoot').innerHTML='<div class="view active">'+v.fn()+'</div>';

function toggleLead(id,glow){

function cp(btn,text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(function(){});}
  var orig=btn.innerHTML;
  btn.classList.add('copied');
  btn.innerHTML=IC.check+'Copied';
  var toast=document.getElementById('toast');toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show');},1800);
  setTimeout(function(){btn.classList.remove('copied');btn.innerHTML=orig;},1800);
}
